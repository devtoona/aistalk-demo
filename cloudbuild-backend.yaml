# backend: build → Artifact Registry → Cloud Run deploy
#
# 手動実行例:
#   gcloud builds submit --config cloudbuild-backend.yaml \
#     --substitutions=_REGION=asia-northeast1,_AR_REPO=aistalk-backend,_SERVICE_NAME=aistalk-backend,_SERVICE_ACCOUNT=aistalk-backend@PROJECT.iam.gserviceaccount.com

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - backend/Dockerfile.prod
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest
      - backend

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api
    waitFor: [build]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SERVICE_ACCOUNT}
      - --allow-unauthenticated
      - --port=8080
      - --timeout=3600
    waitFor: [push]

options:
  logging: CLOUD_LOGGING_ONLY
